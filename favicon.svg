<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" fill="#0d0f12" rx="3"/>

  <!-- Gray outer house slopes (left & right) -->
  <line x1="2" y1="28" x2="9.5" y2="13" stroke="#808080" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="28" x2="22.5" y2="13" stroke="#808080" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Blue center roofline — W shape from logo -->
  <polygon points="5,28 11,11 14,18.5 16,7 18,18.5 21,11 27,28" fill="#2B7EC1"/>

  <!-- Chimney details on blue peaks (left peak) -->
  <rect x="9.5" y="9" width="2" height="3.5" fill="#2B7EC1"/>
  <!-- Chimney on right peak -->
  <rect x="20.5" y="9" width="2" height="3.5" fill="#2B7EC1"/>
</svg>
